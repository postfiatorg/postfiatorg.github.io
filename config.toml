baseURL = 'https://postfiat.org/'
languageCode = 'en-us'
title = 'Post Fiat'
theme = 'PaperMod'

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true
disableKinds = ["taxonomy", "term"]
ignoreFiles = [
  '^content/activate\.md$',
  '^content/archives\.md$',
  '^content/posts\.md$',
  '^content/posts/.*',
  '^content/search\.md$',
  '^content/subscribe\.md$',
  '^content/landing-.*\.md$',
  '^content/whitepaper_legacy\.md$',
]
# googleAnalytics = "UA-123-45"

[minify]
disableXML = true
# minifyOutput = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    [[languages.en.menu.main]]
      name = "Whitepaper"
      url = "whitepaper/"
      weight = 5
    [[languages.en.menu.main]]
      name = "Task Node"
      url = "task-node/"
      weight = 10
    [[languages.en.menu.main]]
      name = "Community"
      url = "community/"
      weight = 20
    [[languages.en.menu.main]]
      name = "Validator Benchmark"
      url = "validator-benchmark/"
      weight = 30
      
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "Post Fiat is a fair, private XRP-derived network for capital markets and collective intelligence."
  author = "postfiat"
  # author = ["Me", "You"]
  defaultTheme = "dark"
  # disableThemeToggle = true
  ShowShareButtons = false
  ShowReadingTime = true
  # disableSpecial1stPost = true
  displayFullLangName = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  # comments = false
  images = ["papermod-cover.png"]
  [markup.goldmark.renderer]
    unsafe = true


[params.homeInfoParams]
  Title = "Post Fiat"
  Content = '''Fair, private XRP for capital markets and collective intelligence. Read the [Whitepaper](/whitepaper/), use the [Task Node](/task-node/), or join the [Community](/community/).'''
  
  [[params.socialIcons]]
    name = "twitter"
    title = "Follow Post Fiat on X"
    url = "https://www.twitter.com/postfiatorg"
  
  [[params.socialIcons]]
    name = "Discord"
    title = "Join the Post Fiat community"
    url = "https://postfiat.org/community/"
  
  [[params.socialIcons]]
    name = "github"
    title = "Post Fiat GitHub"
    url = "https://www.github.com/postfiatorg"

[params.Social]
  twitter = "postfiatorg"

