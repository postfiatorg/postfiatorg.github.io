<figure class="trust-shift" aria-labelledby="trust-shift-title" aria-describedby="trust-shift-caption trust-shift-machine">
  <style>
    .trust-shift{--amber:#f5c66a;--cyan:#8fd6ff;margin:2rem 0 2.25rem;scroll-margin-top:96px}
    .trust-shift *{box-sizing:border-box}
    .trust-shift code{padding:0;background:transparent;color:inherit;font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.94em}
    .trust-shift sub{font-size:.68em;line-height:0}
    .trust-shift-shell{position:relative;overflow:hidden;border:1px solid rgba(221,255,220,.16);border-radius:8px;background:linear-gradient(180deg,rgba(13,17,14,.96),rgba(5,8,6,.96))}
    .trust-shift-shell::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(221,255,220,.025) 1px,transparent 1px),linear-gradient(rgba(221,255,220,.022) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(180deg,rgba(0,0,0,.78),transparent 85%)}
    .trust-shift-inner{position:relative;padding:18px}
    .trust-shift-eyebrow{margin:0 0 .45rem;color:var(--green);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.72rem;font-weight:650;letter-spacing:.11em;text-transform:uppercase}
    .trust-shift-title{max-width:760px;margin:0 0 1.1rem;color:var(--pale);font-size:clamp(1.28rem,2.2vw,1.8rem);font-weight:650;line-height:1.12}
    .trust-shift-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;align-items:start}
    .trust-shift-lane{min-width:0;border:1px solid rgba(221,255,220,.13);border-radius:8px;background:rgba(0,0,0,.27)}
    .trust-shift-lane--file{border-color:rgba(245,198,106,.28)}
    .trust-shift-lane--state{border-color:rgba(143,214,255,.28)}
    .trust-shift-lane-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid rgba(221,255,220,.1)}
    .trust-shift-lane-head h3{margin:0;color:var(--pale);font-size:1rem;line-height:1.2;font-weight:650}
    .trust-shift-lane-head p{margin:.22rem 0 0;color:var(--muted);font-size:.82rem;line-height:1.35}
    .trust-shift-badge{flex:none;border:1px solid currentColor;border-radius:999px;padding:4px 8px;font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.64rem;font-weight:650;letter-spacing:.08em;text-transform:uppercase}
    .trust-shift-lane--file .trust-shift-badge{color:var(--amber)}
    .trust-shift-lane--state .trust-shift-badge{color:var(--cyan)}
    .trust-shift-flow{display:grid;gap:10px;padding:13px 14px}
    .trust-step{display:grid;grid-template-columns:26px 1fr;gap:10px;align-items:start}
    .trust-step-index{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.72rem;font-weight:650}
    .trust-shift-lane--file .trust-step-index{border:1px solid rgba(245,198,106,.38);color:var(--amber);background:rgba(245,198,106,.08)}
    .trust-shift-lane--state .trust-step-index{border:1px solid rgba(143,214,255,.36);color:var(--cyan);background:rgba(143,214,255,.07)}
    .trust-step strong{display:block;margin:.05rem 0 .18rem;color:var(--pale);font-size:.93rem;line-height:1.22}
    .trust-step span{display:block;color:var(--muted);font-size:.82rem;line-height:1.35}
    .trust-mini-lists{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px}
    .trust-mini{padding:8px;border:1px solid rgba(221,255,220,.11);border-radius:7px;background:rgba(221,255,220,.035);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
    .trust-mini b{display:block;margin-bottom:.28rem;color:var(--green);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase}
    .trust-mini code{display:block;color:var(--pale);font-size:.78rem;white-space:normal}
    .trust-check-list{display:grid;gap:6px;margin:7px 0 0;padding:0;list-style:none}
    .trust-check-list li{display:grid;grid-template-columns:16px 1fr;gap:7px;margin:0;color:var(--pale-2);font-size:.8rem;line-height:1.28}
    .trust-check-list li::before{content:"";width:8px;height:8px;margin-top:.42rem;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(127,238,100,.12)}
    .trust-outcome-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 14px}
    .trust-outcome{min-height:84px;padding:10px;border:1px solid rgba(221,255,220,.12);border-radius:8px;background:rgba(0,0,0,.32)}
    .trust-outcome strong{display:block;color:var(--pale);font-size:.88rem;line-height:1.2}
    .trust-outcome span{display:block;margin-top:.32rem;color:var(--muted);font-size:.76rem;line-height:1.32}
    .trust-outcome--warn{border-color:rgba(245,198,106,.3);background:rgba(245,198,106,.055)}
    .trust-outcome--pass{border-color:rgba(127,238,100,.32);background:rgba(127,238,100,.065)}
    .trust-shift figcaption{margin:.68rem 0 0;color:var(--muted);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.78rem;line-height:1.52}
    .trust-shift-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    @media(max-width:820px){.trust-shift{scroll-margin-top:80px}.trust-shift-inner{padding:14px}.trust-shift-grid{grid-template-columns:1fr}.trust-shift-title{font-size:1.25rem}.trust-outcome-row,.trust-mini-lists{grid-template-columns:1fr}.trust-shift-lane-head{display:block}.trust-shift-badge{display:inline-flex;margin-top:9px}.trust-outcome{min-height:0}}
  </style>

  <div class="trust-shift-shell" role="img">
    <div class="trust-shift-inner">
      <p class="trust-shift-eyebrow">Trust transition</p>
      <div id="trust-shift-title" class="trust-shift-title">The same validator-list change has two very different failure modes.</div>

      <div class="trust-shift-grid">
        <section class="trust-shift-lane trust-shift-lane--file" aria-label="Trust as a published file">
          <div class="trust-shift-lane-head">
            <div>
              <h3>Trust as a published file</h3>
              <p>A signed list can be transparent, but its transition is not checked by consensus.</p>
            </div>
            <span class="trust-shift-badge">off-chain</span>
          </div>

          <div class="trust-shift-flow">
            <div class="trust-step">
              <span class="trust-step-index">1</span>
              <div><strong>Publisher signs <code>vl.json</code></strong><span>Evidence, scores, and selector logic may all be public.</span></div>
            </div>
            <div class="trust-step">
              <span class="trust-step-index">2</span>
              <div><strong>Operators copy the file</strong><span>Each server updates locally, on its own timing, or not at all.</span></div>
            </div>
            <div class="trust-step">
              <span class="trust-step-index">3</span>
              <div>
                <strong>Servers can diverge</strong>
                <span>Overlap is a social assumption rather than a transition witness.</span>
                <div class="trust-mini-lists">
                  <div class="trust-mini"><b>Server A</b><code>v1 v2 v3 v4</code></div>
                  <div class="trust-mini"><b>Server B</b><code>v1 v2 v3 v6</code></div>
                </div>
              </div>
            </div>
          </div>

          <div class="trust-outcome-row">
            <div class="trust-outcome trust-outcome--warn">
              <strong>Change = new file</strong>
              <span>The safety of the change is not protocol-checkable.</span>
            </div>
            <div class="trust-outcome">
              <strong>If unsafe</strong>
              <span>There is no old-rules rejection path.</span>
            </div>
          </div>
        </section>

        <section class="trust-shift-lane trust-shift-lane--state" aria-label="Trust as protocol state">
          <div class="trust-shift-lane-head">
            <div>
              <h3>Trust as protocol state</h3>
              <p>Cobalt turns list evolution into a typed transition object checked by the prior rules.</p>
            </div>
            <span class="trust-shift-badge">on-chain roots</span>
          </div>

          <div class="trust-shift-flow">
            <div class="trust-step">
              <span class="trust-step-index">1</span>
              <div><strong>Commit the current state</strong><span>Registry <code>G<sub>t</sub></code>, trust graph <code>T<sub>t</sub></code>, checker <code>&chi;<sub>t</sub></code>.</span></div>
            </div>
            <div class="trust-step">
              <span class="trust-step-index">2</span>
              <div><strong>Submit transition packet</strong><span><code>G<sub>t</sub> &rarr; G<sub>t+1</sub></code>, with a complete witness.</span></div>
            </div>
            <div class="trust-step">
              <span class="trust-step-index">3</span>
              <div>
                <strong>Run old-rule checks</strong>
                <ul class="trust-check-list">
                  <li>local quorum arithmetic</li>
                  <li>linkedness closure</li>
                  <li>old-new intersection exceeds B</li>
                  <li>complete cover stays within limit</li>
                  <li>old checker only</li>
                </ul>
              </div>
            </div>
          </div>

          <div class="trust-outcome-row">
            <div class="trust-outcome">
              <strong>Any check fails</strong>
              <span>Keep <code>G<sub>t</sub></code> active.</span>
            </div>
            <div class="trust-outcome trust-outcome--pass">
              <strong>All checks pass</strong>
              <span>Activate <code>G<sub>t+1</sub></code> with a replayable witness.</span>
            </div>
          </div>

        </section>
      </div>
    </div>
  </div>
  <figcaption id="trust-shift-caption">The diagram is a substrate comparison: a recommended-list architecture distributes a file; a Cobalt-style registry accepts or rejects a transition under the previous active rules. The right side does not automate governance; it makes the safety condition inspectable before the change takes effect.</figcaption>
  <p id="trust-shift-machine" class="trust-shift-sr">Machine-readable diagram summary: Left branch, trust as published file: publisher signs vl.json; operators may copy it or miss it; servers can hold different UNLs; overlap is assumed outside the protocol; the change is a new file and transition safety is not protocol-checkable. Right branch, trust as protocol state: registry root G_t, trust-graph root T_t, and checker root chi_t are committed state; a transition packet from G_t to G_t+1 must pass local quorum arithmetic, linkedness closure, old-new quorum intersection greater than B, bounded complete cover, and validation by old rules chi_t. Failure leaves G_t active; success activates G_t+1 with a replayable witness.</p>
</figure>
