<figure class="trust-state-figure" aria-labelledby="trust-state-title" aria-describedby="trust-state-caption trust-state-machine">
  <style>
    .trust-state-figure{margin:2.2rem 0 2.4rem}
    .trust-state-figure *{box-sizing:border-box}
    .trust-state-figure code{padding:0;background:transparent;color:inherit;font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.95em}
    .trust-state-figure sub{font-size:.68em;line-height:0}
    .trust-state-panel{position:relative;overflow:hidden;border:1px solid rgba(221,255,220,.16);border-radius:8px;background:linear-gradient(180deg,rgba(16,20,16,.92),rgba(5,8,5,.92));box-shadow:0 22px 70px rgba(0,0,0,.28)}
    .trust-state-panel::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(221,255,220,.035) 1px,transparent 1px),linear-gradient(rgba(221,255,220,.028) 1px,transparent 1px);background-size:36px 36px;mask-image:linear-gradient(180deg,rgba(0,0,0,.85),transparent 78%)}
    .trust-state-inner{position:relative;padding:18px}
    .trust-state-kicker{margin:0 0 .35rem;color:var(--green);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.72rem;font-weight:650;letter-spacing:.11em;text-transform:uppercase}
    .trust-state-title{margin:0 0 1rem;color:var(--pale);font-size:clamp(1.18rem,2.6vw,1.75rem);font-weight:650;line-height:1.12}
    .trust-state-grid{display:grid;grid-template-columns:minmax(0,1fr) 70px minmax(0,1fr);gap:14px;align-items:stretch}
    .trust-lane{display:flex;min-width:0;flex-direction:column;gap:12px;padding:14px;border:1px solid rgba(221,255,220,.12);border-radius:8px;background:rgba(0,0,0,.32)}
    .trust-lane--state{border-color:rgba(127,238,100,.3);background:rgba(127,238,100,.055)}
    .trust-lane-label{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0;color:var(--pale);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.78rem;font-weight:650;letter-spacing:.08em;text-transform:uppercase}
    .trust-lane-label span:last-child{color:var(--muted);font-size:.68rem;font-weight:500}
    .trust-node{position:relative;padding:13px;border:1px solid rgba(221,255,220,.13);border-radius:8px;background:rgba(16,20,16,.76)}
    .trust-node strong{display:block;margin:0 0 .28rem;color:var(--pale);font-size:1rem;line-height:1.22}
    .trust-node p{margin:0;color:var(--muted);font-size:.86rem;line-height:1.38}
    .trust-arrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:9px;color:var(--muted);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.68rem;letter-spacing:.04em;text-transform:uppercase}
    .trust-arrow::before,.trust-arrow::after{content:"";height:1px;background:rgba(221,255,220,.18)}
    .trust-arrow b{display:grid;place-items:center;width:28px;height:28px;border:1px solid rgba(221,255,220,.18);border-radius:50%;color:var(--green);font-size:.95rem;font-weight:500}
    .trust-server-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .trust-server{padding:10px;border:1px solid rgba(221,255,220,.12);border-radius:7px;background:rgba(221,255,220,.035);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
    .trust-server span{display:block;color:var(--green);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em}
    .trust-server code{display:block;margin-top:.32rem;padding:0;background:transparent;color:var(--pale);font-size:.82rem;white-space:normal}
    .trust-outcome{margin-top:auto;padding:12px;border-radius:8px;background:rgba(0,0,0,.38);border:1px solid rgba(221,255,220,.1)}
    .trust-outcome strong{display:block;color:var(--pale);font-size:.94rem;line-height:1.24}
    .trust-outcome p{margin:.32rem 0 0;color:var(--muted);font-size:.84rem;line-height:1.38}
    .trust-bridge{display:flex;align-items:center;justify-content:center;min-width:0}
    .trust-bridge-card{display:grid;place-items:center;width:70px;min-height:100%;border-radius:999px;border:1px solid rgba(127,238,100,.28);background:linear-gradient(180deg,rgba(127,238,100,.15),rgba(127,238,100,.04));color:var(--green);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.68rem;text-align:center;text-transform:uppercase;letter-spacing:.08em;line-height:1.25;writing-mode:vertical-rl;transform:rotate(180deg)}
    .trust-root-list{display:grid;gap:7px;margin-top:4px}
    .trust-root{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-radius:7px;background:rgba(0,0,0,.3);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.78rem;color:var(--pale)}
    .trust-root span:last-child{color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em}
    .trust-checks{display:grid;gap:8px;margin:0;padding:0;list-style:none}
    .trust-checks li{display:grid;grid-template-columns:22px 1fr;gap:8px;align-items:start;margin:0;color:var(--pale-2);font-size:.86rem;line-height:1.32}
    .trust-checks li::before{content:"\2713";display:grid;place-items:center;width:18px;height:18px;margin-top:1px;border-radius:50%;background:rgba(127,238,100,.16);border:1px solid rgba(127,238,100,.38);color:var(--green);font-size:.7rem;font-weight:650}
    .trust-checks code{color:var(--pale);font-size:.9em}
    .trust-state-result{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:auto}
    .trust-result{padding:11px;border:1px solid rgba(221,255,220,.12);border-radius:8px;background:rgba(0,0,0,.34)}
    .trust-result strong{display:block;color:var(--pale);font-size:.9rem;line-height:1.2}
    .trust-result span{display:block;margin-top:.3rem;color:var(--muted);font-size:.78rem;line-height:1.35}
    .trust-result--pass{border-color:rgba(127,238,100,.28);background:rgba(127,238,100,.07)}
    .trust-state-figure figcaption{margin:.75rem 0 0;color:var(--muted);font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.78rem;line-height:1.55}
    .trust-state-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    @media(max-width:820px){.trust-state-inner{padding:14px}.trust-state-grid{grid-template-columns:1fr;gap:12px}.trust-bridge{min-height:42px}.trust-bridge-card{width:100%;min-height:42px;writing-mode:horizontal-tb;transform:none;border-radius:999px}.trust-server-row,.trust-state-result{grid-template-columns:1fr}.trust-lane{padding:12px}}
  </style>
  <div class="trust-state-panel" role="img">
    <div class="trust-state-inner">
      <p class="trust-state-kicker">Diagram</p>
      <div id="trust-state-title" class="trust-state-title">A validator-list change is either a copied file or a checked state transition.</div>
      <div class="trust-state-grid">
        <section class="trust-lane" aria-label="Trust as a published file">
          <p class="trust-lane-label">Published file <span>off-chain</span></p>
          <div class="trust-node">
            <strong>Publisher signs <code>vl.json</code></strong>
            <p>Evidence, scoring, and selector logic can all be public.</p>
          </div>
          <div class="trust-arrow" aria-hidden="true"><b>&darr;</b></div>
          <div class="trust-node">
            <strong>Operators copy the file</strong>
            <p>Each server updates locally, on its own timing, or not at all.</p>
          </div>
          <div class="trust-server-row" aria-label="Example divergent server lists">
            <div class="trust-server"><span>Server A UNL</span><code>v1 v2 v3 v4</code></div>
            <div class="trust-server"><span>Server B UNL</span><code>v1 v2 v3 v6</code></div>
          </div>
          <div class="trust-outcome">
            <strong>Change = a new file.</strong>
            <p>The transition's safety is not a protocol-checkable object.</p>
          </div>
        </section>

        <div class="trust-bridge" aria-hidden="true">
          <div class="trust-bridge-card">same problem, different substrate</div>
        </div>

        <section class="trust-lane trust-lane--state" aria-label="Trust as protocol state">
          <p class="trust-lane-label">Protocol state <span>on-chain roots</span></p>
          <div class="trust-node">
            <strong>Committed roots at time <code>t</code></strong>
            <div class="trust-root-list">
              <div class="trust-root"><span>Registry <code>G<sub>t</sub></code></span><span>validators</span></div>
              <div class="trust-root"><span>Trust graph <code>T<sub>t</sub></code></span><span>views</span></div>
              <div class="trust-root"><span>Checker <code>&chi;<sub>t</sub></code></span><span>rules</span></div>
            </div>
          </div>
          <div class="trust-arrow" aria-hidden="true"><b>&darr;</b></div>
          <div class="trust-node">
            <strong>Transition packet <code>G<sub>t</sub> &rarr; G<sub>t+1</sub></code></strong>
            <ul class="trust-checks">
              <li>local rows: <code>t &lt; 2q - n</code> and <code>2t &lt; q</code></li>
              <li>linkedness closure recomputed from declared views</li>
              <li>old-new quorum intersections exceed <code>B</code></li>
              <li>complete cover is bounded by <code>M<sub>cover</sub></code></li>
              <li>validated only by old rules <code>&chi;<sub>t</sub></code></li>
            </ul>
          </div>
          <div class="trust-state-result">
            <div class="trust-result">
              <strong>Any check fails</strong>
              <span>Keep <code>G<sub>t</sub></code> active.</span>
            </div>
            <div class="trust-result trust-result--pass">
              <strong>All checks pass</strong>
              <span>Activate <code>G<sub>t+1</sub></code> with a replayable witness.</span>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
  <figcaption id="trust-state-caption">The diagram contrasts the same governance event on two substrates: a recommended-list architecture distributes a new file; a Cobalt-style registry accepts or rejects a typed transition object under the previous active rules.</figcaption>
  <p id="trust-state-machine" class="trust-state-sr">Machine-readable diagram summary: Left branch, trust as published file: publisher signs vl.json; operators may copy it or miss it; servers can hold different UNLs; overlap is assumed outside the protocol; the change is a new file and the transition safety is unverifiable by protocol logic. Right branch, trust as protocol state: registry root G_t, trust-graph root T_t, and checker root chi_t are committed state; a transition packet from G_t to G_t+1 must pass local quorum inequalities, linkedness closure, old-new quorum intersection greater than B, bounded complete cover, and validation by old rules chi_t. Failure leaves G_t active; success activates G_t+1 with a replayable witness.</p>
</figure>
