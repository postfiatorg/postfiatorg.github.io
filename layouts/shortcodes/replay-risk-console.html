{{- $id := printf "replay-risk-console-%d" .Ordinal -}}
<figure class="replay-risk-console" id="{{ $id }}" data-replay-risk-console>
  <style>
    .replay-risk-console{margin:2rem 0 2.2rem;padding:18px;border:1px solid rgba(221,255,220,.16);border-radius:8px;background:linear-gradient(180deg,rgba(16,20,16,.94),rgba(7,10,7,.96));box-shadow:0 24px 80px rgba(0,0,0,.32);color:#ddffdc}
    .replay-risk-console *{box-sizing:border-box}
    .rrc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
    .replay-risk-console .rrc-kicker{margin:0 0 5px;color:#7fee64;font:650 .76rem/1 "IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.08em;text-transform:uppercase}
    .replay-risk-console .rrc-title{margin:0;color:#ddffdc;font-size:1.35rem;line-height:1.1;font-weight:650}
    .rrc-signal{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:flex-end;color:#bad8b6;font:500 .76rem/1.2 "IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
    .rrc-pill{border:1px solid rgba(127,238,100,.26);border-radius:999px;padding:6px 8px;background:rgba(127,238,100,.06);white-space:nowrap}
    .rrc-flow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:16px}
    .rrc-step{min-height:58px;padding:10px;border:1px solid rgba(221,255,220,.12);border-radius:8px;background:rgba(221,255,220,.035)}
    .rrc-step strong{display:block;margin-bottom:4px;color:#ddffdc;font-size:.9rem;line-height:1.1}
    .rrc-step span{display:block;color:#83917f;font-size:.76rem;line-height:1.25}
    .rrc-body{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(260px,.95fr);gap:18px;align-items:start}
    .rrc-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;padding:14px;border:1px solid rgba(221,255,220,.1);border-radius:8px;background:rgba(0,0,0,.18)}
    .rrc-dot{aspect-ratio:1;border-radius:50%;border:1px solid rgba(221,255,220,.18);background:rgba(131,145,127,.28);box-shadow:inset 0 0 0 2px rgba(0,0,0,.18)}
    .rrc-dot.blocker{background:#f05d5e;border-color:#ff9c9d;box-shadow:0 0 16px rgba(240,93,94,.22)}
    .rrc-dot.verified{background:#0e3e33;border-color:#5dcaa5;box-shadow:0 0 14px rgba(93,202,165,.18)}
    .rrc-dot.unchecked{background:#6b5712;border-color:#e9c75f;box-shadow:0 0 14px rgba(233,199,95,.16)}
    .rrc-dot.deep{background:#2d235f;border-color:#b6a5ff;box-shadow:0 0 14px rgba(182,165,255,.18)}
    .rrc-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;color:#bad8b6;font-size:.78rem}
    .rrc-key{display:inline-flex;align-items:center;gap:6px}
    .rrc-swatch{width:10px;height:10px;border-radius:50%;border:1px solid rgba(221,255,220,.24)}
    .rrc-swatch.blocker{background:#f05d5e;border-color:#ff9c9d}.rrc-swatch.verified{background:#0e3e33;border-color:#5dcaa5}.rrc-swatch.unchecked{background:#6b5712;border-color:#e9c75f}.rrc-swatch.deep{background:#2d235f;border-color:#b6a5ff}
    .rrc-controls{display:grid;gap:10px}
    .rrc-control{padding:10px;border:1px solid rgba(221,255,220,.1);border-radius:8px;background:rgba(221,255,220,.03)}
    .rrc-label{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;color:#ddffdc;font-size:.86rem}
    .rrc-value{color:#7fee64;font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
    .rrc-control input{width:100%;accent-color:#7fee64}
    .rrc-output{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:16px}
    .rrc-metric{padding:12px;border:1px solid rgba(127,238,100,.18);border-radius:8px;background:rgba(127,238,100,.055)}
    .rrc-metric span{display:block;margin-bottom:5px;color:#83917f;font-size:.76rem;text-transform:uppercase;letter-spacing:.06em}
    .rrc-metric strong{display:block;color:#ddffdc;font-size:1.22rem;line-height:1.05}
    .replay-risk-console .rrc-caption{margin:14px 0 0;color:#83917f;font-size:.86rem;line-height:1.45}
    @media(max-width:780px){.rrc-head{display:block}.rrc-signal{justify-content:flex-start;margin-top:12px}.rrc-flow{grid-template-columns:1fr}.rrc-body{grid-template-columns:1fr}.rrc-grid{grid-template-columns:repeat(7,1fr)}.rrc-output{grid-template-columns:1fr}}
  </style>
  <div class="rrc-head">
    <div>
      <p class="rrc-kicker">Common Signal / Human Checks</p>
      <h3 class="rrc-title">Replay safety depends on residual verification.</h3>
    </div>
    <div class="rrc-signal" aria-label="Replay path">
      <span class="rrc-pill">packet</span><span class="rrc-pill">rule floor</span><span class="rrc-pill">replay hash</span><span class="rrc-pill">validators</span>
    </div>
  </div>
  <div class="rrc-flow" aria-hidden="true">
    <div class="rrc-step"><strong>Packet</strong><span>source-backed facts</span></div>
    <div class="rrc-step"><strong>Rule floor</strong><span>obvious hard stops</span></div>
    <div class="rrc-step"><strong>Replay hash</strong><span>one common signal</span></div>
    <div class="rrc-step"><strong>Checks</strong><span>verify, challenge, fork</span></div>
    <div class="rrc-step"><strong>Vote</strong><span>operators decide</span></div>
  </div>
  <div class="rrc-body">
    <div>
      <div class="rrc-grid" data-grid aria-label="Simulated validator set"></div>
      <div class="rrc-legend" aria-label="Validator legend">
        <span class="rrc-key"><span class="rrc-swatch blocker"></span>blocker</span>
        <span class="rrc-key"><span class="rrc-swatch verified"></span>verified</span>
        <span class="rrc-key"><span class="rrc-swatch unchecked"></span>unchecked</span>
        <span class="rrc-key"><span class="rrc-swatch deep"></span>deep review</span>
      </div>
    </div>
    <div class="rrc-controls">
      <label class="rrc-control"><span class="rrc-label">Validators <span class="rrc-value" data-value="validators"></span></span><input data-control="validators" type="range" min="21" max="81" step="2" value="41"></label>
      <label class="rrc-control"><span class="rrc-label">Verification rate <span class="rrc-value" data-value="verification"></span></span><input data-control="verification" type="range" min="0" max="100" step="5" value="60"></label>
      <label class="rrc-control"><span class="rrc-label">Human catch chance <span class="rrc-value" data-value="catch"></span></span><input data-control="catch" type="range" min="0" max="100" step="5" value="40"></label>
      <label class="rrc-control"><span class="rrc-label">Unchecked follow <span class="rrc-value" data-value="unchecked"></span></span><input data-control="unchecked" type="range" min="0" max="100" step="5" value="20"></label>
      <label class="rrc-control"><span class="rrc-label">Replay miss rate <span class="rrc-value" data-value="miss"></span></span><input data-control="miss" type="range" min="0" max="100" step="5" value="20"></label>
      <label class="rrc-control"><span class="rrc-label">Deep-review seats <span class="rrc-value" data-value="deep"></span></span><input data-control="deep" type="range" min="0" max="12" step="1" value="3"></label>
    </div>
  </div>
  <div class="rrc-output">
    <div class="rrc-metric"><span>NO votes block</span><strong data-output="block"></strong></div>
    <div class="rrc-metric"><span>Expected blockers</span><strong data-output="expected"></strong></div>
    <div class="rrc-metric"><span>Unsafe pass</span><strong data-output="unsafe"></strong></div>
  </div>
  <p class="rrc-caption">Illustrative model only. Identical replay outputs are one common signal; the blocking tail comes from validators who still perform residual checks.</p>
  <script>
    (()=>{const root=document.getElementById("{{ $id }}");if(!root)return;const controls=Object.fromEntries([...root.querySelectorAll("[data-control]")].map((el)=>[el.dataset.control,el]));const values=Object.fromEntries([...root.querySelectorAll("[data-value]")].map((el)=>[el.dataset.value,el]));const outputs=Object.fromEntries([...root.querySelectorAll("[data-output]")].map((el)=>[el.dataset.output,el]));const grid=root.querySelector("[data-grid]");const pct=(x)=>`${Math.round(x*100)}%`;const binomTail=(n,p,k)=>{if(k<0)return 0;if(k>=n)return 1;if(p<=0)return 1;if(p>=1)return k>=n?1:0;let q=1-p,pmf=Math.pow(q,n),sum=0;for(let x=0;x<=k;x++){if(x>0)pmf=pmf*((n-x+1)/x)*(p/q);sum+=pmf}return Math.min(1,Math.max(0,sum))};const fillDots=(n,blockers,deep,verified,unchecked)=>{grid.innerHTML="";for(let i=0;i<n;i++){const dot=document.createElement("span");dot.className="rrc-dot";if(i<blockers)dot.classList.add("blocker");else if(i<blockers+deep)dot.classList.add("deep");else if(i<blockers+deep+verified)dot.classList.add("verified");else if(i<blockers+deep+verified+unchecked)dot.classList.add("unchecked");grid.appendChild(dot)}};const update=()=>{const n=Number(controls.validators.value),verification=Number(controls.verification.value)/100,catchP=Number(controls.catch.value)/100,uncheckedRate=Number(controls.unchecked.value)/100,miss=Number(controls.miss.value)/100,deep=Math.min(Number(controls.deep.value),n);const yesNeeded=Math.floor(n*.8)+1,noBlock=n-yesNeeded+1,checkers=deep+(n-deep)*verification,pEff=Math.min(1,(checkers/n)*catchP),conditionalMiss=binomTail(n,pEff,noBlock-1),unsafe=miss*conditionalMiss,expected=checkers*catchP;values.validators.textContent=String(n);values.verification.textContent=pct(verification);values.catch.textContent=pct(catchP);values.unchecked.textContent=pct(uncheckedRate);values.miss.textContent=pct(miss);values.deep.textContent=String(deep);outputs.block.textContent=String(noBlock);outputs.expected.textContent=expected.toFixed(1);outputs.unsafe.textContent=`${(unsafe*100).toFixed(2)}%`;const blockers=Math.min(n,Math.round(expected)),deepDots=Math.min(deep,n-blockers),unchecked=Math.min(Math.round(n*uncheckedRate),n-blockers-deepDots),verified=Math.min(Math.max(0,Math.round(checkers)-deep),n-blockers-deepDots-unchecked);fillDots(n,blockers,deepDots,verified,unchecked)};Object.values(controls).forEach((el)=>el.addEventListener("input",update));update()})();
  </script>
</figure>
