<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <rect width="960" height="560" fill="#0f172a"/>
  <text x="480" y="34" fill="#e2e8f0" font-size="19" font-weight="700" text-anchor="middle">The same journey, transparent vs. private</text>
  <!-- Transparent lane -->
  <text x="40" y="76" fill="#6ee7b7" font-size="14" font-weight="700">TRANSPARENT (Priya)</text>
  <text x="250" y="76" fill="#94a3b8" font-size="11.5">every step visible on the ledger</text>
  <g>
    <rect x="40" y="90" width="130" height="56" rx="8" fill="#0c4a6e" stroke="#38bdf8"/>
    <text x="105" y="114" fill="#e0f2fe" font-size="12.5" font-weight="600" text-anchor="middle">USDC deposit</text>
    <text x="105" y="132" fill="#bae6fd" font-size="11" text-anchor="middle">Arbitrum vault</text>
    <rect x="210" y="90" width="130" height="56" rx="8" fill="#064e3b" stroke="#34d399"/>
    <text x="275" y="114" fill="#d1fae5" font-size="12.5" font-weight="600" text-anchor="middle">pfUSDC mint</text>
    <text x="275" y="132" fill="#a7f3d0" font-size="11" text-anchor="middle">observer-verified</text>
    <rect x="380" y="90" width="150" height="56" rx="8" fill="#064e3b" stroke="#34d399"/>
    <text x="455" y="114" fill="#d1fae5" font-size="12.5" font-weight="600" text-anchor="middle">NAVSwap at epoch NAV</text>
    <text x="455" y="132" fill="#a7f3d0" font-size="11" text-anchor="middle">pfUSDC → a651</text>
    <rect x="570" y="90" width="130" height="56" rx="8" fill="#064e3b" stroke="#34d399"/>
    <text x="635" y="114" fill="#d1fae5" font-size="12.5" font-weight="600" text-anchor="middle">hold a651</text>
    <text x="635" y="132" fill="#a7f3d0" font-size="11" text-anchor="middle">supply +, TVL +</text>
    <rect x="740" y="90" width="180" height="56" rx="8" fill="#0c4a6e" stroke="#38bdf8"/>
    <text x="830" y="114" fill="#e0f2fe" font-size="12.5" font-weight="600" text-anchor="middle">redeem at NAV → USDC</text>
    <text x="830" y="132" fill="#bae6fd" font-size="11" text-anchor="middle">vault release, Arbitrum</text>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#b)">
    <path d="M170 118 L206 118"/><path d="M340 118 L376 118"/><path d="M530 118 L566 118"/><path d="M700 118 L736 118"/>
  </g>
  <!-- divider -->
  <line x1="40" y1="185" x2="920" y2="185" stroke="#334155" stroke-dasharray="6 6"/>
  <!-- Private lane -->
  <text x="40" y="222" fill="#c4b5fd" font-size="14" font-weight="700">PRIVATE (Bob)</text>
  <text x="180" y="222" fill="#94a3b8" font-size="11.5">visible entry · shielded middle · visible exit</text>
  <rect x="40" y="240" width="130" height="56" rx="8" fill="#0c4a6e" stroke="#38bdf8"/>
  <text x="105" y="264" fill="#e0f2fe" font-size="12.5" font-weight="600" text-anchor="middle">USDC deposit</text>
  <text x="105" y="282" fill="#bae6fd" font-size="11" text-anchor="middle">visible: asset, amount</text>
  <rect x="210" y="240" width="130" height="56" rx="8" fill="#064e3b" stroke="#34d399"/>
  <text x="275" y="264" fill="#d1fae5" font-size="12.5" font-weight="600" text-anchor="middle">pfUSDC mint</text>
  <text x="275" y="282" fill="#a7f3d0" font-size="11" text-anchor="middle">observer-verified</text>
  <!-- shielded region -->
  <rect x="370" y="216" width="330" height="180" rx="14" fill="#2e1065" stroke="#a78bfa" stroke-width="2"/>
  <text x="535" y="240" fill="#ede9fe" font-size="13" font-weight="700" text-anchor="middle">SHIELDED — Asset Orchard</text>
  <rect x="390" y="254" width="90" height="50" rx="8" fill="#4c1d95" stroke="#c4b5fd"/>
  <text x="435" y="275" fill="#ede9fe" font-size="11.5" font-weight="600" text-anchor="middle">shielded</text>
  <text x="435" y="291" fill="#ede9fe" font-size="11.5" font-weight="600" text-anchor="middle">ingress</text>
  <rect x="500" y="254" width="90" height="50" rx="8" fill="#4c1d95" stroke="#c4b5fd"/>
  <text x="545" y="275" fill="#ede9fe" font-size="11.5" font-weight="600" text-anchor="middle">private swap</text>
  <text x="545" y="291" fill="#ddd6fe" font-size="10.5" text-anchor="middle">joint proof</text>
  <rect x="610" y="254" width="70" height="50" rx="8" fill="#4c1d95" stroke="#c4b5fd"/>
  <text x="645" y="275" fill="#ede9fe" font-size="11.5" font-weight="600" text-anchor="middle">private</text>
  <text x="645" y="291" fill="#ede9fe" font-size="11.5" font-weight="600" text-anchor="middle">egress</text>
  <text x="535" y="330" fill="#ddd6fe" font-size="11.5" text-anchor="middle">not revealed: asset ids, amounts,</text>
  <text x="535" y="347" fill="#ddd6fe" font-size="11.5" text-anchor="middle">owners, and the price of the trade</text>
  <text x="535" y="376" fill="#a78bfa" font-size="10.5" text-anchor="middle">published: nullifiers, anchor, proof</text>
  <!-- exits -->
  <rect x="740" y="228" width="180" height="64" rx="8" fill="#0c4a6e" stroke="#38bdf8"/>
  <text x="830" y="252" fill="#e0f2fe" font-size="12.5" font-weight="600" text-anchor="middle">Exit A: redeem at NAV</text>
  <text x="830" y="270" fill="#bae6fd" font-size="11" text-anchor="middle">USDC on Arbitrum</text>
  <text x="830" y="285" fill="#bae6fd" font-size="11" text-anchor="middle">fair value, slower</text>
  <rect x="740" y="308" width="180" height="64" rx="8" fill="#164e63" stroke="#22d3ee"/>
  <text x="830" y="332" fill="#cffafe" font-size="12.5" font-weight="600" text-anchor="middle">Exit B: sell on Uniswap</text>
  <text x="830" y="350" fill="#a5f3fc" font-size="11" text-anchor="middle">mainnet pool price,</text>
  <text x="830" y="365" fill="#a5f3fc" font-size="11" text-anchor="middle">NAV band circuit-breaker</text>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#b)">
    <path d="M170 268 L206 268"/><path d="M340 268 L386 272"/><path d="M700 268 L736 260"/><path d="M700 290 L736 336"/>
  </g>
  <defs><marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#64748b"/></marker></defs>
  <!-- boundary markers -->
  <g fill="#f59e0b" font-size="10.5" font-weight="600">
    <text x="105" y="430">▲ visible boundary</text>
    <text x="795" y="430">▲ visible boundary</text>
  </g>
  <text x="480" y="470" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">The claim: a private trade between visible public boundaries.</text>
  <text x="480" y="492" fill="#94a3b8" font-size="11.5" text-anchor="middle">Not claimed: amount anonymity at entry/exit, or timing-correlation resistance.</text>
  <text x="480" y="530" fill="#64748b" font-size="11" text-anchor="middle">R82 proved the private lane live: 21 PFTL txs verified, router receipt verified, 6/6 validators at one state root, 534.62 s.</text>
</svg>
