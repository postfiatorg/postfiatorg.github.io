  <text x="795" y="259" fill="#a5f3fc" font-size="11.5" text-anchor="middle">around NAV</text>
  <rect x="685" y="287" width="220" height="52" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="795" y="309" fill="#cbd5e1" font-size="12" text-anchor="middle">venue price ≠ oracle:</text>
  <text x="795" y="326" fill="#cbd5e1" font-size="12" text-anchor="middle">arb vs NAV rail disciplines it</text>
  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)">
    <path d="M300 150 L343 150"/>
    <path d="M370 300 L302 300" transform="translate(0,0)"/>
    <path d="M615 150 L658 150"/>
  </g>
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M615 326 L683 326" marker-end="url(#a)"/>
  </g>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#94a3b8"/></marker></defs>
  <text x="322" y="140" fill="#94a3b8" font-size="10.5" text-anchor="middle">deposit</text>
  <text x="336" y="290" fill="#94a3b8" font-size="10.5" text-anchor="middle">withdraw</text>
  <text x="637" y="140" fill="#94a3b8" font-size="10.5" text-anchor="middle">bridge</text>
  <text x="649" y="316" fill="#94a3b8" font-size="10.5" text-anchor="middle">burn/return</text>
  <text x="480" y="415" fill="#64748b" font-size="11.5" text-anchor="middle">Cash is counted on Arbitrum · truth lives on PFTL · trading happens on mainnet</text>
</svg>
