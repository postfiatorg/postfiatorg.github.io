<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <rect width="960" height="430" fill="#0f172a"/>
  <text x="480" y="34" fill="#e2e8f0" font-size="19" font-weight="700" text-anchor="middle">One product, two chains, one ledger of record</text>
  <!-- Arbitrum column -->
  <rect x="30" y="60" width="270" height="330" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="165" y="88" fill="#7dd3fc" font-size="15" font-weight="700" text-anchor="middle">ARBITRUM ONE</text>
  <text x="165" y="106" fill="#94a3b8" font-size="12" text-anchor="middle">cash custody</text>
  <rect x="55" y="125" width="220" height="64" rx="8" fill="#0c4a6e" stroke="#38bdf8"/>
  <text x="165" y="152" fill="#e0f2fe" font-size="13.5" font-weight="600" text-anchor="middle">ERC20BridgeVault</text>
  <text x="165" y="172" fill="#bae6fd" font-size="12" text-anchor="middle">real USDC, atom-for-atom</text>
  <rect x="55" y="205" width="220" height="52" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="165" y="227" fill="#cbd5e1" font-size="12.5" text-anchor="middle">deposit evidence: tx, block,</text>
  <text x="165" y="244" fill="#cbd5e1" font-size="12.5" text-anchor="middle">log index, confirmations</text>
  <rect x="55" y="273" width="220" height="52" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="165" y="295" fill="#cbd5e1" font-size="12.5" text-anchor="middle">withdrawal verifier releases</text>
  <text x="165" y="312" fill="#cbd5e1" font-size="12.5" text-anchor="middle">USDC on PFTL burn</text>
  <!-- PFTL column -->
  <rect x="345" y="60" width="270" height="330" rx="12" fill="#122b22" stroke="#14532d"/>
  <text x="480" y="88" fill="#6ee7b7" font-size="15" font-weight="700" text-anchor="middle">PFTL</text>
  <text x="480" y="106" fill="#94a3b8" font-size="12" text-anchor="middle">ledger of record</text>
  <rect x="370" y="125" width="220" height="48" rx="8" fill="#064e3b" stroke="#34d399"/>
  <text x="480" y="145" fill="#d1fae5" font-size="13" font-weight="600" text-anchor="middle">pfUSDC receipts</text>
  <text x="480" y="163" fill="#a7f3d0" font-size="11.5" text-anchor="middle">observer-quorum verified mint</text>
  <rect x="370" y="184" width="220" height="48" rx="8" fill="#064e3b" stroke="#34d399"/>
  <text x="480" y="204" fill="#d1fae5" font-size="13" font-weight="600" text-anchor="middle">NAV epochs</text>
  <text x="480" y="222" fill="#a7f3d0" font-size="11.5" text-anchor="middle">nav_per_unit, supply, reserve hash</text>
  <rect x="370" y="243" width="220" height="48" rx="8" fill="#2e1065" stroke="#a78bfa"/>
  <text x="480" y="263" fill="#ede9fe" font-size="13" font-weight="600" text-anchor="middle">Asset Orchard (shielded)</text>
  <text x="480" y="281" fill="#ddd6fe" font-size="11.5" text-anchor="middle">private notes, private swaps</text>
  <rect x="370" y="302" width="220" height="48" rx="8" fill="#064e3b" stroke="#34d399"/>
  <text x="480" y="322" fill="#d1fae5" font-size="13" font-weight="600" text-anchor="middle">a651 supply ledger</text>
  <text x="480" y="340" fill="#a7f3d0" font-size="11.5" text-anchor="middle">canonical units outstanding</text>
  <!-- Mainnet column -->
  <rect x="660" y="60" width="270" height="330" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="795" y="88" fill="#67e8f9" font-size="15" font-weight="700" text-anchor="middle">ETHEREUM MAINNET</text>
  <text x="795" y="106" fill="#94a3b8" font-size="12" text-anchor="middle">trading venue</text>
  <rect x="685" y="125" width="220" height="56" rx="8" fill="#164e63" stroke="#22d3ee"/>
  <text x="795" y="148" fill="#cffafe" font-size="13" font-weight="600" text-anchor="middle">wrapped a651 ERC-20</text>
