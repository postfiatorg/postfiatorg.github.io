<text x="60" y="62" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="start" opacity="1">07 / Bridge Finality Verification</text><line x1="60" y1="86" x2="1540" y2="86" stroke="#23402a" stroke-width="2" opacity="1"/><rect x="90" y="330" width="230" height="130" rx="18" fill="#141006" stroke="#ffd166" stroke-width="2" opacity="1"/><text x="108" y="364" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="108" dy="0">Incoming packet</tspan></text><text x="108" y="396" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" opacity="1"><tspan x="108" dy="0">source, amount,</tspan><tspan x="108" dy="22.5">recipient, nonce</tspan></text><rect x="440" y="130" width="350" height="58" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="458" y="164" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" opacity="1"><tspan x="458" dy="0">domain check</tspan></text><rect x="440" y="222" width="350" height="58" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="458" y="256" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" opacity="1"><tspan x="458" dy="0">receipt root</tspan></text><line x1="615" y1="188" x2="615" y2="222" stroke="#4fc3ff" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="1"/><rect x="440" y="314" width="350" height="58" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="458" y="348" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" opacity="1"><tspan x="458" dy="0">validator certificate</tspan></text><line x1="615" y1="280" x2="615" y2="314" stroke="#4fc3ff" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="1"/><rect x="440" y="406" width="350" height="58" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="458" y="440" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" opacity="1"><tspan x="458" dy="0">field match</tspan></text><line x1="615" y1="372" x2="615" y2="406" stroke="#4fc3ff" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="1"/><rect x="440" y="498" width="350" height="58" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="458" y="532" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" opacity="1"><tspan x="458" dy="0">freshness / expiry</tspan></text><line x1="615" y1="464" x2="615" y2="498" stroke="#4fc3ff" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="1"/><rect x="440" y="590" width="350" height="58" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="458" y="624" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" opacity="1"><tspan x="458" dy="0">nonce unused</tspan></text><line x1="615" y1="556" x2="615" y2="590" stroke="#4fc3ff" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="1"/><line x1="320" y1="395" x2="440" y2="159" stroke="#ffd166" stroke-width="2" marker-end="url(#arrow-amber)" opacity="1"/><line x1="790" y1="405" x2="980" y2="280" stroke="#7fee64" stroke-width="2" marker-end="url(#arrow-mint)" opacity="1"/><rect x="980" y="220" width="250" height="105" rx="18" fill="#07140a" stroke="#7fee64" stroke-width="2" opacity="1"/><text x="998" y="254" fill="#7fee64" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700" opacity="1"><tspan x="998" dy="0">ACCEPT</tspan></text><text x="998" y="286" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="1"><tspan x="998" dy="0">mint / release allowed</tspan></text><rect x="1000" y="410" width="250" height="34" rx="10" fill="#160707" stroke="#ff6868" stroke-width="2" opacity="1"/><text x="1018" y="444" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" opacity="1"><tspan x="1018" dy="0">wrong chain</tspan></text><line x1="790" y1="160" x2="1000" y2="427" stroke="#ff6868" stroke-width="1.5" stroke-dasharray="10 8" marker-end="url(#arrow-red)" opacity="0.85"/><rect x="1000" y="458" width="250" height="34" rx="10" fill="#160707" stroke="#ff6868" stroke-width="2" opacity="1"/><text x="1018" y="492" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" opacity="1"><tspan x="1018" dy="0">changed amount</tspan></text><line x1="790" y1="252" x2="1000" y2="475" stroke="#ff6868" stroke-width="1.5" stroke-dasharray="10 8" marker-end="url(#arrow-red)" opacity="0.85"/><rect x="1000" y="506" width="250" height="34" rx="10" fill="#160707" stroke="#ff6868" stroke-width="2" opacity="1"/><text x="1018" y="540" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" opacity="1"><tspan x="1018" dy="0">changed recipient</tspan></text><line x1="790" y1="344" x2="1000" y2="523" stroke="#ff6868" stroke-width="1.5" stroke-dasharray="10 8" marker-end="url(#arrow-red)" opacity="0.85"/><rect x="1000" y="554" width="250" height="34" rx="10" fill="#160707" stroke="#ff6868" stroke-width="2" opacity="1"/><text x="1018" y="588" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" opacity="1"><tspan x="1018" dy="0">expired</tspan></text><line x1="790" y1="436" x2="1000" y2="571" stroke="#ff6868" stroke-width="1.5" stroke-dasharray="10 8" marker-end="url(#arrow-red)" opacity="0.85"/><rect x="1000" y="602" width="250" height="34" rx="10" fill="#160707" stroke="#ff6868" stroke-width="2" opacity="1"/><text x="1018" y="636" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" opacity="1"><tspan x="1018" dy="0">nonce replay</tspan></text><line x1="790" y1="528" x2="1000" y2="619" stroke="#ff6868" stroke-width="1.5" stroke-dasharray="10 8" marker-end="url(#arrow-red)" opacity="0.85"/><rect x="1000" y="650" width="250" height="34" rx="10" fill="#160707" stroke="#ff6868" stroke-width="2" opacity="1"/><text x="1018" y="684" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" opacity="1"><tspan x="1018" dy="0">bad certificate</tspan></text><line x1="790" y1="620" x2="1000" y2="667" stroke="#ff6868" stroke-width="1.5" stroke-dasharray="10 8" marker-end="url(#arrow-red)" opacity="0.85"/><text x="90" y="790" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" opacity="1">The Ethereum verifier accepts only the exact finalized packet. Any mutation or replay fails.</text></svg>
