<rect width="1600" height="900" fill="url(#grid)" opacity="0.55"/>
<rect x="28" y="26" width="1544" height="848" rx="24" fill="none" stroke="#23402a" stroke-width="2"/>
<text x="60" y="62" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="start" opacity="1">13 / Safety Gates</text><line x1="60" y1="86" x2="1540" y2="86" stroke="#23402a" stroke-width="2" opacity="1"/><rect x="70" y="135" width="350" height="150" rx="18" fill="#07110a" stroke="#7fee64" stroke-width="2" opacity="1"/><text x="88" y="169" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="88" dy="0">proof freshness</tspan></text><text x="88" y="201" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="88" dy="0">input: NAV epoch</tspan><tspan x="88" dy="21.25">check: timestamp &lt;= deadline</tspan><tspan x="88" dy="21.25">fail: stale proof</tspan></text><rect x="450" y="135" width="350" height="150" rx="18" fill="#07110a" stroke="#7fee64" stroke-width="2" opacity="1"/><text x="468" y="169" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="468" dy="0">reserve arithmetic</tspan></text><text x="468" y="201" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="468" dy="0">input: leg totals</tspan><tspan x="468" dy="21.25">check: spot + cash - liabilities</tspan><tspan x="468" dy="21.25">fail: net mismatch</tspan></text><rect x="830" y="135" width="350" height="150" rx="18" fill="#07110a" stroke="#7fee64" stroke-width="2" opacity="1"/><text x="848" y="169" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="848" dy="0">supply</tspan></text><text x="848" y="201" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="848" dy="0">input: mint request</tspan><tspan x="848" dy="21.25">check: supply cap / policy</tspan><tspan x="848" dy="21.25">fail: supply violation</tspan></text><rect x="1210" y="135" width="350" height="150" rx="18" fill="#07110a" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="1228" y="169" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="1228" dy="0">bridge finality</tspan></text><text x="1228" y="201" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="1228" dy="0">input: packet</tspan><tspan x="1228" dy="21.25">check: certificate / root</tspan><tspan x="1228" dy="21.25">fail: bad finality</tspan></text><rect x="70" y="327" width="350" height="150" rx="18" fill="#160707" stroke="#ff6868" stroke-width="2" opacity="1"/><text x="88" y="361" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="88" dy="0">replay</tspan></text><text x="88" y="393" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="88" dy="0">input: nonce</tspan><tspan x="88" dy="21.25">check: unused</tspan><tspan x="88" dy="21.25">fail: nonce replay</tspan></text><line x1="88" y1="345" x2="402" y2="459" stroke="#ff6868" stroke-width="4" opacity="0.75"/><rect x="450" y="327" width="350" height="150" rx="18" fill="#07110a" stroke="#b18cff" stroke-width="2" opacity="1"/><text x="468" y="361" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="468" dy="0">privacy proof</tspan></text><text x="468" y="393" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="468" dy="0">input: zk proof</tspan><tspan x="468" dy="21.25">check: verify</tspan><tspan x="468" dy="21.25">fail: invalid proof</tspan></text><rect x="830" y="327" width="350" height="150" rx="18" fill="#07110a" stroke="#ffd166" stroke-width="2" opacity="1"/><text x="848" y="361" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="848" dy="0">nullifier</tspan></text><text x="848" y="393" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="848" dy="0">input: spend</tspan><tspan x="848" dy="21.25">check: not seen</tspan><tspan x="848" dy="21.25">fail: double spend</tspan></text><rect x="1210" y="327" width="350" height="150" rx="18" fill="#07110a" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="1228" y="361" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="1228" dy="0">market display</tspan></text><text x="1228" y="393" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" opacity="1"><tspan x="1228" dy="0">input: pool price + NAV</tspan><tspan x="1228" dy="21.25">check: separate labels</tspan><tspan x="1228" dy="21.25">fail: oracle confusion</tspan></text><rect x="360" y="585" width="880" height="85" rx="18" fill="#141006" stroke="#ffd166" stroke-width="2" opacity="1"/><text x="378" y="619" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" opacity="1"><tspan x="378" dy="0">Fail closed rule</tspan></text><text x="378" y="651" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" opacity="1"><tspan x="378" dy="0">A failed gate blocks the downstream state transition and must be surfaced clearly in UX.</tspan></text><text x="90" y="795" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" opacity="1">Every dangerous shortcut is modeled as: input artifact -&gt; check -&gt; pass output or named failure.</text></svg>
