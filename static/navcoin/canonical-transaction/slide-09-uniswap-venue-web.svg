<text x="60" y="62" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="start" opacity="1">09 / Venue Price vs Canonical NAV</text><line x1="60" y1="86" x2="1540" y2="86" stroke="#23402a" stroke-width="2" opacity="1"/><rect x="80" y="150" width="430" height="500" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="98" y="184" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" opacity="1"><tspan x="98" dy="0">Uniswap venue</tspan></text><text x="98" y="216" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" opacity="1"><tspan x="98" dy="0">wNAV reserve</tspan><tspan x="98" dy="30.0">USDC reserve</tspan><tspan x="98" dy="30.0">AMM curve</tspan><tspan x="98" dy="30.0">market price</tspan><tspan x="98" dy="30.0">slippage</tspan></text><rect x="1090" y="150" width="430" height="500" rx="18" fill="#07140a" stroke="#7fee64" stroke-width="2" opacity="1"/><text x="1108" y="184" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" opacity="1"><tspan x="1108" dy="0">PFTL NAV epoch</tspan></text><text x="1108" y="216" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" opacity="1"><tspan x="1108" dy="0">latest epoch</tspan><tspan x="1108" dy="30.0">NAV/unit</tspan><tspan x="1108" dy="30.0">proof timestamp</tspan><tspan x="1108" dy="30.0">fresh / stale</tspan></text><line x1="510" y1="400" x2="650" y2="400" stroke="#4fc3ff" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="1"/><line x1="1090" y1="400" x2="950" y2="400" stroke="#7fee64" stroke-width="2" marker-end="url(#arrow-mint)" opacity="1"/><rect x="650" y="230" width="300" height="255" rx="18" fill="#141006" stroke="#ffd166" stroke-width="2" opacity="1"/><text x="668" y="264" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" opacity="1"><tspan x="668" dy="0">Interface display</tspan></text><text x="668" y="296" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" opacity="1"><tspan x="668" dy="0">Market price</tspan><tspan x="668" dy="30.0">Canonical NAV/unit</tspan><tspan x="668" dy="30.0">Premium / discount</tspan></text><rect x="210" y="690" width="1180" height="115" rx="18" fill="#061007" stroke="#7fee64" stroke-width="2" opacity="1"/><text x="228" y="724" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" opacity="1"><tspan x="228" dy="0">Key rule</tspan></text><text x="228" y="756" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" opacity="1"><tspan x="228" dy="0">Pool reserves produce market price. PFTL proof state produces canonical NAV/unit. The venue is useful for liquidity, but it is</tspan><tspan x="228" dy="26.25">not the reserve oracle.</tspan></text></svg>
