<text x="60" y="62" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="start" opacity="1">03 / Proof Of Reserves Balance Sheet</text><line x1="60" y1="86" x2="1540" y2="86" stroke="#23402a" stroke-width="2" opacity="1"/><rect x="80" y="120" width="420" height="640" rx="18" fill="#07110a" stroke="#7fee64" stroke-width="2" opacity="1"/><text x="98" y="154" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" opacity="1"><tspan x="98" dy="0">Reserve legs</tspan></text><rect x="115" y="150" width="350" height="38" rx="9" fill="#061007" stroke="#7fee64" stroke-width="1.5"/><text x="135" y="175" fill="#7fee64" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ EVM spot</text><rect x="115" y="202" width="350" height="38" rx="9" fill="#061007" stroke="#7fee64" stroke-width="1.5"/><text x="135" y="227" fill="#7fee64" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ NEAR</text><rect x="115" y="254" width="350" height="38" rx="9" fill="#061007" stroke="#7fee64" stroke-width="1.5"/><text x="135" y="279" fill="#7fee64" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ Solana</text><rect x="115" y="306" width="350" height="38" rx="9" fill="#061007" stroke="#7fee64" stroke-width="1.5"/><text x="135" y="331" fill="#7fee64" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ XMR</text><rect x="115" y="358" width="350" height="38" rx="9" fill="#061007" stroke="#7fee64" stroke-width="1.5"/><text x="135" y="383" fill="#7fee64" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ Aave collateral</text><rect x="115" y="410" width="350" height="38" rx="9" fill="#061007" stroke="#7fee64" stroke-width="1.5"/><text x="135" y="435" fill="#7fee64" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ Hyperliquid spot</text><rect x="115" y="462" width="350" height="38" rx="9" fill="#061007" stroke="#4fc3ff" stroke-width="1.5"/><text x="135" y="487" fill="#4fc3ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ Hyperliquid cash</text><rect x="115" y="514" width="350" height="38" rx="9" fill="#061007" stroke="#4fc3ff" stroke-width="1.5"/><text x="135" y="539" fill="#4fc3ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">+ uPnL</text><rect x="115" y="566" width="350" height="38" rx="9" fill="#061007" stroke="#ff6868" stroke-width="1.5"/><text x="135" y="591" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">- Aave borrow</text><rect x="115" y="618" width="350" height="38" rx="9" fill="#061007" stroke="#ff6868" stroke-width="1.5"/><text x="135" y="643" fill="#ff6868" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start" opacity="1">- Other liabilities</text><polygon points="710,330.0 840.0,400 710,470.0 580.0,400" fill="#171306" stroke="#ffd166" stroke-width="2"/><text x="592.0" y="394" fill="#ffd166" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" opacity="1"><tspan x="592.0" dy="0">Arithmetic gate</tspan></text><text x="710" y="505" fill="#ffd166" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="800" text-anchor="middle" opacity="1">spot + cash - liabilities</text><line x1="500" y1="440" x2="580" y2="440" stroke="#7fee64" stroke-width="2" marker-end="url(#arrow-mint)" opacity="1"/><line x1="840" y1="440" x2="940" y2="440" stroke="#ffd166" stroke-width="2" marker-end="url(#arrow-amber)" opacity="1"/><rect x="970" y="230" width="470" height="330" rx="18" fill="#061018" stroke="#4fc3ff" stroke-width="2" opacity="1"/><text x="988" y="264" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" opacity="1"><tspan x="988" dy="0">Proof packet</tspan></text><text x="988" y="296" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" opacity="1"><tspan x="988" dy="0">timestamp</tspan><tspan x="988" dy="27.5">proof hash</tspan><tspan x="988" dy="27.5">policy version</tspan><tspan x="988" dy="27.5">leg totals</tspan><tspan x="988" dy="27.5">verified NAV</tspan></text><rect x="550" y="660" width="500" height="105" rx="18" fill="#080a08" stroke="#6f7b70" stroke-width="2" stroke-dasharray="10 8" opacity="1"/><text x="568" y="694" fill="#6f7b70" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" opacity="1"><tspan x="568" dy="0">gross perp notional</tspan></text><text x="568" y="726" fill="#bad8b6" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" opacity="1"><tspan x="568" dy="0">disclosure only - not added to NAV</tspan></text><line x1="710" y1="612" x2="710" y2="660" stroke="#6f7b70" stroke-width="2" stroke-dasharray="10 8" marker-end="url(#arrow-gray)" opacity="1"/><text x="80" y="815" fill="#ddffdc" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" text-anchor="start" opacity="1">Required result: verified net assets includes cash, subtracts liabilities, excludes gross notional.</text></svg>
